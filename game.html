  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Inter', sans-serif; color: #fff; }

    .car-card .car-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .car-card .car-stats { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 6px; }

    /* Track Selector */
    .track-row { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
    .track-chip { padding: 10px 20px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }

    .touch-btn:active { background: rgba(0,212,255,0.3); border-color: #00d4ff; }

    @keyframes spin { to { transform: rotate(360deg); } }
